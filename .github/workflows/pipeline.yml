name: Using Security and Trivy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/karthikeya-app

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for git leaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t karthikeya-app:latest .

      - name: Verify image exists
        run: docker images karthikeya-app

      - name: Scan with Trivy
        id: trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/Library/Caches:/root/.cache \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            karthikeya-app:latest
        continue-on-error: true

      - name: Push to GHCR
        run: |
          docker tag karthikeya-app:latest ${{ env.IMAGE_NAME }}:latest
          docker tag karthikeya-app:latest ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Ask Gemini what went wrong
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Pipeline failed. Branch: ${{ github.ref_name }}. By: ${{ github.actor }}" | python ai_helper.py